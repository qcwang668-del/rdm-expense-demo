<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页 - 研发费用管理系统 Demo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#" aria-label="研发费用管理系统">
        <span class="brand-logo">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <defs><linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2f8cff"/><stop offset="1" stop-color="#006be6"/></linearGradient></defs>
            <rect x="4" y="4" width="24" height="24" rx="7" fill="url(#logoGradient)"/>
            <path d="M10 21V11h5.4c2.6 0 4.4 1.4 4.4 3.6 0 1.5-.8 2.6-2.1 3.2l3 3.2h-3.2l-2.6-2.9h-2v2.9H10Zm3-5.2h2.2c1 0 1.6-.5 1.6-1.3 0-.8-.6-1.3-1.6-1.3H13v2.6Z" fill="#fff"/>
          </svg>
        </span>
        <span class="brand-text">研发费用管理系统</span>
      </a>
      <nav class="side-nav" aria-label="主菜单"></nav>
      <button class="collapse" aria-label="收起菜单">‹</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="left-tools">
          <button class="icon-btn" aria-label="折叠菜单">☰</button>
          <button class="icon-btn" aria-label="刷新">↻</button>
          <nav class="breadcrumb" aria-label="breadcrumb"></nav>
        </div>
        <div class="right-tools">
          <button class="company-select">华润万家有限公司 <span>⌄</span></button>
          <button class="search"><span>搜索</span><kbd>Ctrl K</kbd></button>
          <button class="icon-btn" aria-label="全屏">⛶</button>
          <button class="theme-btn">dark</button>
          <button class="icon-btn" aria-label="通知">◌</button>
          <button class="user-btn"><span class="avatar">王</span> 王雁 <span>⌄</span></button>
        </div>
      </header>
      <section class="tabs-row" aria-label="已打开页面"></section>
      <section class="content"></section>
    </main>
  </div>
  <div class="overlay-root" aria-live="polite"></div>
  <div class="toast-root" aria-live="polite"></div>
  <script src="./app.js"></script>
  <script src="./enhance.js"></script>
  <script src="./round3.js"></script>
  <script src="./round4.js"></script>
  <script src="./round5.js"></script>
  <script src="./round6.js"></script>
  <script src="./round7.js"></script>
  <script src="./round8.js"></script>
  <script src="./round9.js"></script>
  <script src="./round10.js"></script>
  <script src="./round11.js"></script>
</body>
</html>
